<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Member | Django CRUD</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>

<body>
    <div class="main-container animate-fade-in" style="max-width: 600px;">
        <header class="page-header">
            <div>
                <h1>New Member Registration</h1>
                <p style="color: var(--text-muted); font-size: 0.875rem; margin-top: 0.25rem;">Fill in the details to create a new member record.</p>
            </div>
            <a href="{% url 'index' %}" class="btn btn-outline">Cancel</a>
        </header>

        <section class="card">
            <form action="{% url 'addrec' %}" method="POST">
                {% csrf_token %}
                
                <div class="form-group">
                    <label for="first">First Name</label>
                    <input type="text" name="first" id="first" placeholder="e.g., John" class="form-input" required>
                </div>

                <div class="form-group">
                    <label for="last">Last Name</label>
                    <input type="text" name="last" id="last" placeholder="e.g., Doe" class="form-input" required>
                </div>

                <div class="form-group">
                    <label for="country">Country</label>
                    <input type="text" name="country" id="country" placeholder="e.g., USA" class="form-input" required>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Create Member</button>
                    <a href="{% url 'index' %}" class="btn btn-outline" style="flex: 1;">Back Dashboard</a>
                </div>
            </form>
        </section>
    </div>
</body>

</html>
