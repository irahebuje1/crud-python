<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Dashboard | Django CRUD</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>

<body>
    <div class="main-container animate-fade-in">
        <header class="page-header">
            <div>
                <h1>Member Directory</h1>
                <p style="color: var(--text-muted); font-size: 0.875rem; margin-top: 0.25rem;">View and manage registered members from one central dashboard.</p>
            </div>
            <a href="{% url 'add' %}" class="btn btn-primary">
                <span>Add New Member</span>
            </a>
        </header>

        <section class="card">
            <div class="table-wrapper">
                <table id="customers">
                    <thead>
                        <tr>
                            <th style="width: 10%;">ID</th>
                            <th style="width: 25%;">First Name</th>
                            <th style="width: 25%;">Last Name</th>
                            <th style="width: 20%;">Country</th>
                            <th style="width: 20%; text-align: center;">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for x in mem %}
                        <tr>
                            <td style="font-weight: 600; color: var(--text-muted);">#{{x.id}}</td>
                            <td>{{x.firstname}}</td>
                            <td>{{x.lastname}}</td>
                            <td>
                                <span style="background-color: #f1f5f9; padding: 0.25rem 0.5rem; border-radius: 0.25rem; font-size: 0.75rem; font-weight: 500;">{{x.country}}</span>
                            </td>
                            <td style="text-align: center; display: flex; justify-content: center; gap: 0.5rem; border-bottom: none;">
                                <a href="{% url 'update' id=x.id %}" class="btn btn-outline" style="padding: 0.4rem 0.75rem; font-size: 0.75rem;">Edit</a>
                                <a href="{% url 'delete' id=x.id %}" class="btn btn-danger" style="padding: 0.4rem 0.75rem; font-size: 0.75rem;" onclick="return confirm('Are you sure you want to delete this member?')">Delete</a>
                            </td>
                        </tr>
                        {% empty %}
                        <tr>
                            <td colspan="5" style="text-align: center; padding: 3rem; color: var(--text-muted);">
                                <div style="display: flex; flex-direction: column; align-items: center; gap: 1rem;">
                                    <span style="font-size: 0.875rem;">No members registered yet.</span>
                                </div>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </section>
    </div>
</body>

</html>
